<svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c94a31"/>
      <stop offset="100%" stop-color="#7e2a1b"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="36" height="36" rx="8" fill="url(#bg)"/>
  <!-- 顶部内发光 -->
  <rect width="36" height="36" rx="8" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="1.2"/>
  <!-- 礼盒盒体 -->
  <rect x="5" y="20" width="26" height="13" rx="2.5" stroke="white" stroke-width="2.2" fill="none"/>
  <!-- 盒盖横向纱带 -->
  <rect x="5" y="20" width="26" height="4.5" fill="rgba(255,255,255,.14)"/>
  <!-- 竖向丝带 -->
  <line x1="18" y1="20" x2="18" y2="33" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- 蝴蝶结左翼 -->
  <path d="M 18,20 C 14,13 5,11 7,17 C 8,21 18,20 18,20"
    stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
    fill="rgba(255,255,255,.14)"/>
  <!-- 蝴蝶结右翼 -->
  <path d="M 18,20 C 22,13 31,11 29,17 C 28,21 18,20 18,20"
    stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
    fill="rgba(255,255,255,.14)"/>
  <!-- 结扣 -->
  <circle cx="18" cy="20" r="2.6" fill="white"/>
</svg>
