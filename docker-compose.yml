# Optional convenience wrapper — the app is a single image/container.
services:
  libu:
    build: .
    image: libu
    container_name: libu
    ports:
      - "8080:8080"
    environment:
      # Set these for internal-family Basic Auth. Empty password = auth disabled.
      APP_USERNAME: ${APP_USERNAME:-family}
      APP_PASSWORD: ${APP_PASSWORD:-}
    volumes:
      - libu-data:/app/data   # persists SQLite (/app/data/libu.db)
    restart: unless-stopped

volumes:
  libu-data:
