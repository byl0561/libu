server {
    listen 8080;

    # Site-wide HTTP Basic Auth — the ONLY access control. Generated at container
    # start from APP_USERNAME / APP_PASSWORD by docker-entrypoint.sh. Declared at
    # server scope so both the SPA shell and /api/ are protected by one credential.
    # Wildcard include tolerates a missing file so nginx never fails to start.
    include /etc/nginx/auth.conf*;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;   # SPA history-mode fallback
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8000;   # gunicorn (FastAPI) in the same container
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
